name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build signed release
    runs-on: ubuntu-latest

    env:
      # build.gradle.kts reads these to configure signingConfigs.release.
      ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/pawmino-release.p12
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK Platform 35 and Build Tools 35.0.0
        run: |
          yes | sdkmanager "platforms;android-35" "build-tools;35.0.0" >/dev/null

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_FILE"
          echo "Keystore decoded to a temporary file."

      - name: Build signed release APK
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Build signed release AAB
        run: ./gradlew :app:bundleRelease --no-daemon --stacktrace

      - name: Locate release APK
        id: locate
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          AAB_PATH=$(find app/build/outputs/bundle/release -name "*.aab" | head -n 1)
          if [ -z "$APK_PATH" ] || [ -z "$AAB_PATH" ]; then
            echo "::error::Could not locate build outputs."
            exit 1
          fi
          echo "apk=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "aab=$AAB_PATH" >> "$GITHUB_OUTPUT"
          echo "APK: $APK_PATH"
          echo "AAB: $AAB_PATH"

      - name: Verify APK signature and certificate
        run: |
          BUILD_TOOLS="$ANDROID_HOME/build-tools/35.0.0"
          APKSIGNER="$BUILD_TOOLS/apksigner"
          echo "Running apksigner verify --print-certs"
          CERTS=$("$APKSIGNER" verify --print-certs "${{ steps.locate.outputs.apk }}")
          echo "$CERTS"
          if echo "$CERTS" | grep -q "CN=Android Debug"; then
            echo "::error::Release artifact is signed with the Android Debug certificate."
            exit 1
          fi
          echo "Certificate check passed (not the debug key)."

      - name: Upload signed APK (for testing)
        uses: actions/upload-artifact@v4
        with:
          name: pawmino-release-apk
          path: ${{ steps.locate.outputs.apk }}
          if-no-files-found: error

      - name: Upload signed AAB (for Google Play)
        uses: actions/upload-artifact@v4
        with:
          name: pawmino-release-aab
          path: ${{ steps.locate.outputs.aab }}
          if-no-files-found: error
